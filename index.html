<!DOCTYPE html>
<head>
    <meta charset="UTF-8">
    <title>My Business Website</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background-color:rgb(95, 71, 71)
        }
        /* HEADER */
        .header {
            background: linear-gradient(to right, #405DE6, #833AB4, #FFDC80, #C13584, #F56040);
            color: rgb(0, 0, 0);
            text-align: center;
            padding: 50px 20px;
        }

        .header h1 {
            font-size: 38px;
            letter-spacing: 1px;
        }

        .header p {
            margin-top: 10px;
            font-size: 15px;
        }

        .header span {
            font-weight: bold;
        }

        /* NAVBAR */
        .navbar {
            background-color: #333;
            overflow: hidden;
        }

        .navbar a {
            float: left;
            color: white;
            text-decoration: none;
            padding: 14px 20px;
            display: block;
            font-size: 15px;
        }

        .navbar a:hover {
            background-color: #555;
        }

        /* MAIN LAYOUT  width: 90%;*/
        .row {
            width: 30%;
            height: 600px;
            margin-left: 35%;
            margin-right: 70%;
            border: 1px solid;
            background-image: url('b6eeb2f2-99f7-4e26-a621-4cb2c1aab339.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

        .footer {
   height: 60px;
   background-color: #333;
   color: rgb(255, 255, 255);
   text-align: center;
}

    </style>
</head>
<body>

    <!-- HEADER -->
    <div class="header">
        <h1>INSTAGRAM REELS</h1>
        <p>Where <span>DESPAIR</span> comes to play.</p>
    </div>

    <!-- NAVIGATION -->
    <div class="navbar">
        <a href="home.html">Home</a>
        <a href="product.html">Products</a>
        <a href="about us.html">About Us</a>
        <a href="Contact us.html">Contact Us</a>
    </div>

   <div class="row">

    </div>


        <div class="footer">
            <p></p>
</div>

</body>
</html>
