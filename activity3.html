<!DOCTYPE html>
<html>
<head>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
            font-family: Arial, sans-serif;
        }
        td {
            border: 1px solid #000;
            text-align: center;
            padding: 10px;
            width: 25%;
        }
        img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto 10px auto;
        }
        .caption {
            font-size: 14px;
            font-weight: bold;
        }
    </style>
</head>
