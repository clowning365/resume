<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Activity 8 - JavaScript Alert</title>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
        }
        h2 {
            color: #333;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            background-color: #ff5722;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        button:hover {
            background-color: #e64a19;
        }
    </style>

    <script>
        function myFunction() {
            var name = "E.L.I.J.A.H";   // ←←← Change this to your real name
            alert("Hi " + name + "! I am an alert box!");
        }
    </script>
</head>
<body>

    <h2>JavaScript Alert Box</h2>
    <p>Click the button below to see the alert.</p>
    
    <button onclick="myFunction()">Click here!</button>

</body>
</html>
