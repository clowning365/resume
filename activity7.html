<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Activity 7</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 80px; }
        button {
            padding: 15px 25px;
            font-size: 18px;
            background-color: #008CBA;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        button:hover { background-color: #0077a3; }
        #demo { margin-top: 30px; font-size: 22px; color: #333; }
    </style>
</head>
<body>

    <h1>My First JavaScript</h1>
    
    <button onclick="showDateTime()">Click me to display Date and Time</button>
    
    <p id="demo"></p>

    <script>
        function showDateTime() {
            const now = new Date();
            document.getElementById('demo').innerHTML = 
                "Current Date & Time: <br><strong>" + now.toLocaleString() + "</strong>";
        }
    </script>

</body>
</html>
